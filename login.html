<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 | 1DAYECO 원데이에코</title>
<meta name="description" content="카카오 계정으로 1DAYECO에 로그인하고 내 구독 현황을 확인하세요.">
<link rel="canonical" href="https://onedayeco.com/login.html">
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.ico">
<style>
  :root{
    --gold:#C9A84C; --gold-light:#E8C97A; --gold-dim:rgba(201,168,76,0.12);
    --dark:#0A0A08; --dark2:#111110; --dark3:#1A1A17;
    --border:rgba(201,168,76,0.2); --text:#E8E4D9; --muted:#88887F;
    --sans:'Noto Sans KR', sans-serif;
  }
  *{box-sizing:border-box}
  body{
    margin:0; min-height:100vh; background:var(--dark); color:var(--text);
    font-family:var(--sans); display:flex; align-items:center; justify-content:center;
  }
  .card{
    width:100%; max-width:380px; margin:24px; padding:44px 32px;
    background:var(--dark2); border:1px solid var(--border); border-radius:18px;
    text-align:center;
  }
  .logo{color:var(--gold); font-weight:800; font-size:20px; letter-spacing:.5px; margin-bottom:6px}
  h1{font-size:17px; font-weight:700; color:var(--gold-light); margin:0 0 8px}
  p.sub{font-size:13px; color:var(--muted); margin:0 0 32px; line-height:1.6}
  .kakao-btn{
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; background:#FEE500; color:#1A1300; font-weight:800; font-size:15px;
    padding:14px 0; border-radius:10px; border:none; cursor:pointer; text-decoration:none;
  }
  .kakao-btn:hover{ filter:brightness(.96) }
  .error-box{
    margin-top:18px; font-size:12.5px; color:#F87171;
    background:rgba(248,113,113,.08); border:1px solid rgba(248,113,113,.3);
    border-radius:8px; padding:10px 12px; display:none;
  }
  .error-box.show{ display:block }
  footer{margin-top:28px; font-size:11.5px; color:var(--muted)}
  footer a{color:var(--muted)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">1DAYECO</div>
  <h1>카카오 계정으로 로그인</h1>
  <p class="sub">로그인하면 내 구독 현황을 확인하고<br>관리할 수 있어요.</p>

  <a class="kakao-btn" href="https://web-production-761cd.up.railway.app/auth/kakao/login">
    💬 카카오로 시작하기
  </a>

  <div class="error-box" id="errBox"></div>

  <footer>
    <a href="/">홈으로 돌아가기</a>
  </footer>
</div>

<script>
const ERROR_MESSAGES = {
  kakao_denied:   '카카오 로그인이 취소되었습니다.',
  token_failed:   '카카오 인증에 실패했습니다. 다시 시도해 주세요.',
  profile_failed: '카카오 프로필 조회에 실패했습니다.',
  kakao_error:    '일시적인 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.',
};
const params = new URLSearchParams(window.location.search);
const err = params.get('error');
if (err) {
  const box = document.getElementById('errBox');
  box.textContent = ERROR_MESSAGES[err] || '로그인 중 문제가 발생했습니다.';
  box.classList.add('show');
}
</script>
</body>
</html>
