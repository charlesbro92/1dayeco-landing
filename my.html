<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마이페이지 | 1DAYECO 원데이에코</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.ico">
<style>
  :root{
    --gold:#C9A84C; --gold-light:#E8C97A; --gold-dim:rgba(201,168,76,0.12);
    --dark:#0A0A08; --dark2:#111110; --dark3:#1A1A17;
    --border:rgba(201,168,76,0.2); --text:#E8E4D9; --muted:#88887F;
    --sans:'Noto Sans KR', sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0; background:var(--dark); color:var(--text); font-family:var(--sans); line-height:1.6}
  .wrap{max-width:600px; margin:0 auto; padding:48px 20px 80px}
  header{display:flex; align-items:center; justify-content:space-between; margin-bottom:32px}
  .logo{color:var(--gold); font-weight:800; font-size:18px; text-decoration:none}
  .logout-btn{background:none; border:1px solid var(--border); color:var(--muted); font-size:12px; padding:7px 14px; border-radius:20px; cursor:pointer}
  .logout-btn:hover{ color:var(--text); border-color:var(--gold) }

  .profile{display:flex; align-items:center; gap:14px; margin-bottom:36px}
  .avatar{width:52px; height:52px; border-radius:50%; background:var(--gold-dim); display:flex; align-items:center; justify-content:center; font-size:22px}
  .profile h1{font-size:18px; margin:0 0 4px; color:var(--gold-light)}
  .profile p{font-size:13px; color:var(--muted); margin:0; display:flex; align-items:center; gap:8px}
  .change-phone-link{color:var(--gold); font-size:12px; text-decoration:none; border-bottom:1px solid transparent}
  .change-phone-link:hover{ border-bottom-color:var(--gold) }

  .sec-title{font-size:13px; color:var(--gold); letter-spacing:1px; text-transform:uppercase; margin-bottom:14px}

  .sub-card{
    background:var(--dark2); border:1px solid var(--border); border-radius:14px;
    padding:18px 20px; margin-bottom:12px; display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .sub-card .name{font-weight:700; font-size:14.5px}
  .sub-card .meta{font-size:12px; color:var(--muted); margin-top:4px}
  .status-pill{font-size:11px; font-weight:700; padding:4px 10px; border-radius:999px; white-space:nowrap}
  .status-active{ background:rgba(74,222,128,.12); color:#4ADE80 }
  .status-trial{ background:var(--gold-dim); color:var(--gold) }
  .status-other{ background:rgba(136,136,127,.15); color:var(--muted) }

  .empty{text-align:center; padding:48px 20px; color:var(--muted); font-size:13.5px}
  .empty a{color:var(--gold)}

  .loading{text-align:center; padding:60px 20px; color:var(--muted); font-size:13px}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading">불러오는 중...</div>
</div>

<script>
const API_BASE = 'https://web-production-761cd.up.railway.app';

const STATUS_LABEL = { active: '구독중', trial: '체험중', expired: '만료', cancelled: '해지' };
const STATUS_CLASS  = { active: 'status-active', trial: 'status-trial' };

function fmtDate(iso) {
  if (!iso) return '-';
  return iso.slice(0, 10);
}

async function loadMe() {
  try {
    const res = await fetch(API_BASE + '/api/me', { credentials: 'include' });
    if (res.status === 401) {
      window.location.href = '/login.html';
      return;
    }
    const data = await res.json();
    if (!data.success) {
      window.location.href = '/login.html';
      return;
    }
    render(data);
  } catch (e) {
    document.getElementById('app').innerHTML = '<div class="empty">불러오는 중 오류가 발생했습니다. 새로고침해 주세요.</div>';
  }
}

function render(data) {
  const subs = data.subscriptions || [];
  const subsHtml = subs.length > 0
    ? subs.map(s => `
      <div class="sub-card">
        <div>
          <div class="name">${s.subtopic_name || s.categories?.join(', ') || '토픽'}</div>
          <div class="meta">${fmtDate(s.start_date)} ~ ${fmtDate(s.end_date)}</div>
        </div>
        <span class="status-pill ${STATUS_CLASS[s.status] || 'status-other'}">${STATUS_LABEL[s.status] || s.status}</span>
      </div>
    `).join('')
    : `<div class="empty">아직 구독 중인 토픽이 없어요.<br><a href="/">홈에서 관심 토픽 둘러보기 →</a></div>`;

  document.getElementById('app').innerHTML = `
    <header>
      <a class="logo" href="/">1DAYECO</a>
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </header>
    <div class="profile">
      <div class="avatar">💬</div>
      <div>
        <h1>${data.nickname || '회원'}님</h1>
        <p>
          <span>${data.phone ? data.phone.replace(/(\\d{3})(\\d{3,4})(\\d{4})/, '$1-$2-$3') : ''}</span>
          <a class="change-phone-link" href="/link-phone.html">번호 변경</a>
        </p>
      </div>
    </div>
    <div class="sec-title">내 구독</div>
    ${subsHtml}
  `;
}

async function logout() {
  await fetch(API_BASE + '/auth/logout', { method: 'POST', credentials: 'include' });
  window.location.href = '/';
}

loadMe();
</script>
</body>
</html>
